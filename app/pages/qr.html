<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self';">
    <title>QR Calendar Appointment</title>
    <link href="../dist/output.css" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #1f2937;
            margin: 0;
            padding: 2rem 1rem;
            min-height: 100vh;
        }

        .page {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 900;
            margin: 0 0 2rem 0;
            text-align: center;
            color: #ffffff;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            padding: 2.5rem;
            backdrop-filter: blur(10px);
        }

        .layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2.5rem;
            align-items: start;
        }

        @media (min-width: 900px) {
            .layout {
                grid-template-columns: 1fr 1fr;
            }
        }

        label {
            display: block;
            font-weight: 700;
            margin-top: 1.25rem;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
            color: #374151;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        label:first-child {
            margin-top: 0;
        }

        input,
        select {
            width: 100%;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            padding: 0.875rem 1rem;
            font-size: 1rem;
            background: #ffffff;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
            background: #f8f9ff;
        }

        input[readonly] {
            background: #f9fafb;
            color: #6b7280;
        }

        .small {
            font-size: 0.85rem;
            color: #6b7280;
            margin-top: 0.75rem;
            line-height: 1.5;
            font-style: italic;
        }

        .left-section {
            display: flex;
            flex-direction: column;
        }

        .right-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #qrcode {
            min-height: 450px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
        }

        #qrcode img,
        #qrcode canvas {
            max-width: 100%;
            height: auto;
            filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.08));
        }

        .qr-label {
            font-size: 0.9rem;
            font-weight: 700;
            color: #667eea;
            text-align: center;
            margin-bottom: 1.25rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
<div class="page">
    <h1>Appointment QR Generator</h1>
    <div class="card">
        <div class="layout">
            <div class="left-section">
                <label for="title">Title</label>
                <select id="title">
                    <option>Delphi Rise - Individual Session</option>
                    <option>Delphi Rise - Group Session</option>
                </select>

                <label for="date">Date</label>
                <input id="date" type="date" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">

                <label for="startTime">Start Time</label>
                <input id="startTime" type="time" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">

                <label for="endTime">End Time</label>
                <input id="endTime" type="time" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">

                <label for="location">Location</label>
                <input id="location" type="text" value="72 Hinchey Road, Rochester, NY 14624" readonly>

                <label for="description">Description</label>
                <input id="description" type="text" value="Phone: 585-467-2230" readonly>

                <div class="small">QR payload includes a calendar event with a default reminder 12 hours before the appointment.</div>
            </div>

            <div class="right-section">
                <div class="qr-label">Scan to Add Event</div>
                <div id="qrcode"></div>
                
                <label for="qrMode" style="margin-top: 2rem;">QR Type</label>
                <select id="qrMode">
                    <option value="appointment">Show Appointment QR</option>
                    <option value="contact">Show Delphi Rise Contact QR</option>
                </select>
            </div>
        </div>
    </div>
</div>

<script src="../vendor/qrcode.min.js"></script>
<script src="../src/pages/qr.js" defer></script>
</body>
</html>
