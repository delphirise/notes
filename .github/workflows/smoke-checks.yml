name: Smoke Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  smoke:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
        working-directory: tooling
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tooling/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Sync pdf.js auxiliary assets
        run: powershell -ExecutionPolicy Bypass -File ./sync-pdf-assets.ps1

      - name: Run smoke check script
        run: npm run smoke

      - name: Run index smoke tests
        run: npm run index:smoke

      - name: Run fixture note tests
        run: npm run fixtures
